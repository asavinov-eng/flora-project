<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flora Scope 2</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"/>

<link rel="stylesheet" href="./css/styles.css"/>
</head>

<body>

<header class="header">
<div class="container header-container">

<a class="logo" href="#">flora</a>

<nav class="desktop-nav">
<ul class="nav-list">
<li><a href="#about">About</a></li>
<li><a href="#bouquets">Bouquets</a></li>
<li><a href="#contacts">Contacts</a></li>
</ul>
</nav>

<button class="header-btn open-modal-btn">
Order Now
</button>

<button class="menu-open">☰</button>

</div>
</header>

<div class="mobile-menu">
<button class="menu-close">✕</button>

<ul class="mobile-menu-list">
<li><a href="#about">About</a></li>
<li><a href="#bouquets">Bouquets</a></li>
<li><a href="#contacts">Contacts</a></li>
</ul>
</div>

<section class="hero">
<div class="container hero-container">

<div class="hero-content">
<h1>Brighten Your Day with Stunning Bouquets</h1>

<p>Beautiful flowers for every occasion.</p>

<button class="hero-btn open-modal-btn">
Buy Flowers
</button>
</div>

<img
class="hero-image"
src="./images/hero@1x.jpg"
srcset="./images/hero@1x.jpg 1x,
./images/hero@2x.jpg 2x"
alt="Flowers"
/>

</div>
</section>

<section class="bestsellers" id="bouquets">
<div class="container">

<h2>Dynamic Bouquets</h2>

<div class="filters">
<input type="text" id="search-input"
placeholder="Search flowers..."/>
</div>

<ul class="cards js-cards-list"></ul>

<button class="load-more-btn">
Load More
</button>

<p class="message"></p>

</div>
</section>

<footer class="footer" id="contacts">
<div class="container">

<form class="subscribe-form">
<label for="email">Subscribe</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter email"
/>

<button type="submit">
Subscribe
</button>
</form>

</div>
</footer>

<div class="backdrop">
<div class="modal">

<button class="modal-close">✕</button>

<h2>Order Flowers</h2>

<form class="modal-form">

<label>
Name
<input
type="text"
name="user-name"
placeholder="Your name"
/>
</label>

<label>
Phone
<input
type="tel"
name="user-phone"
placeholder="+380..."
/>
</label>

<label class="checkbox-wrapper">

<input
type="checkbox"
class="checkbox"
/>

<span class="custom-checkbox"></span>

I agree with terms
</label>

<button type="submit">
Send Order
</button>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script type="module" src="./js/main.js"></script>

</body>
</html>
